name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: lint + test + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - run: flutter pub get

      - name: dart format
        run: dart format --set-exit-if-changed .

      - name: flutter analyze
        run: flutter analyze --fatal-infos

      - name: flutter test with coverage
        run: flutter test --coverage

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/lcov.info ]; then
            echo "## Coverage" >> $GITHUB_STEP_SUMMARY
            awk -F: '
              /^SF:/ { file=$2 }
              /^LF:/ { total += $2 }
              /^LH:/ { hit += $2 }
              END {
                if (total > 0) {
                  printf "Lines covered: %d / %d (%.1f%%)\n", hit, total, (hit/total)*100
                }
              }
            ' coverage/lcov.info >> $GITHUB_STEP_SUMMARY
          fi

  android-debug-build:
    name: Android debug apk
    runs-on: ubuntu-latest
    # MVP: debug build only — release signing lands when we have a keystore.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build apk --debug
